name: Backup

on:
  schedule:
    - cron: '0 6 1 * *' # el día 1 de cada mes a las 06:00 UTC
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente de Postgres 17
        # apt trae pg_dump 16 en Ubuntu 24.04; Supabase corre Postgres 17 y pg_dump
        # rechaza volcar un servidor más nuevo que el cliente. Usamos el repo oficial
        # de PGDG para instalar la versión que coincide.
        run: |
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17

      - name: pg_dump
        run: /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.SUPABASE_DB_URL }}" -f backup.sql

      - name: Cifrar backup
        env:
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          gpg --batch --yes --symmetric --cipher-algo AES256 \
              --passphrase "$BACKUP_PASSPHRASE" -o backup.sql.gpg backup.sql
          rm backup.sql

      - name: Subir backup cifrado como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}
          path: backup.sql.gpg
          retention-days: 90
