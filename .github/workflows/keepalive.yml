name: Keepalive

on:
  schedule:
    - cron: '0 6 * * 1' # todos los lunes a las 06:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sf "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.ANON_KEY }}"
