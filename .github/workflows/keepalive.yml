name: Keepalive

on:
  schedule:
    - cron: '0 6 * * 1' # every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        # No -f: the goal is to generate traffic against the project to avoid
        # the inactivity pause, not a 2xx response. With Supabase's new
        # publishable key, /rest/v1/ responds 401 ("secret key required") long
        # before pausing for inactivity, but that already counts as activity.
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}\n" "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.ANON_KEY }}"
